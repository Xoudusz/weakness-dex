<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weakness Dex</title>
<meta name="description" content="Look up Pokémon type weaknesses, resistances, and immunities. Supports multiple languages.">
<meta property="og:title" content="Weakness Dex">
<meta property="og:description" content="Look up Pokémon type weaknesses, resistances, and immunities.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta property="og:image" content="https://weakness-dex.hyvitech.org/?ogimg=1">
<meta name="twitter:image" content="https://weakness-dex.hyvitech.org/?ogimg=1">
<meta name="theme-color" content="#0d0d0f">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<h1>WEAKNESS DEX</h1>
<p class="sub" data-i18n="subtitle">Type a Pokémon name to see its weaknesses</p>
<div class="ability-tooltip-box" id="ability-tooltip"></div>

<div class="moves-overlay" id="moves-overlay" style="display:none" onclick="closeMoves(event)">
  <div class="moves-modal" onclick="event.stopPropagation()">
    <div class="moves-modal-header">
      <span class="moves-modal-title" id="moves-title">Moves</span>
      <button class="moves-close" onclick="closeMoves()">×</button>
    </div>
    <div class="moves-tabs" id="moves-tabs"></div>
    <div class="moves-body" id="moves-body"><div class="moves-loading"></div></div>
  </div>
</div>

<div class="main-col">
  <div class="top-bar">
    <div class="search-wrap">
      <input type="text" id="inp" data-i18n-placeholder="searchPlaceholder" placeholder="e.g. poochyena, charizard…" autocomplete="off" spellcheck="false"/>
      <div class="dropdown" id="dropdown"></div>
    </div>
    <button class="adv-toggle-btn" id="adv-btn" onclick="toggleAdvanced()"><span class="chevron">▶</span> <span data-i18n="advancedBtn">Advanced</span></button>
    <button class="adv-toggle-btn" id="share-btn" onclick="shareCurrentView()">🔗 <span data-i18n="shareBtn">Share</span></button>
  </div>
  <div class="advanced-panel" id="adv-panel">
    <div class="adv-rows">
      <div class="adv-row">
        <span class="adv-label" data-i18n="genLabel">Generation</span>
        <select id="gen-select" onchange="setGen(this.value)">
          <option value="0" data-i18n="latestGen">Latest (Gen 9)</option>
          <option value="1">Gen 1</option><option value="2">Gen 2</option><option value="3">Gen 3</option>
          <option value="4">Gen 4</option><option value="5">Gen 5</option><option value="6">Gen 6</option>
          <option value="7">Gen 7</option><option value="8">Gen 8</option><option value="9">Gen 9</option>
        </select>
      </div>
      <div class="adv-row">
        <span class="adv-label" data-i18n="abilityLabel">Ability override</span>
        <select id="ability-select" onchange="setAbilityOverride(this.value)">
          <option value="" data-i18n="noneOption">— none —</option>
          <option value="levitate">Levitate</option><option value="flash-fire">Flash Fire</option>
          <option value="volt-absorb">Volt Absorb</option><option value="water-absorb">Water Absorb</option>
          <option value="storm-drain">Storm Drain</option><option value="earth-eater">Earth Eater</option>
          <option value="dry-skin">Dry Skin</option><option value="sap-sipper">Sap Sipper</option>
          <option value="motor-drive">Motor Drive</option><option value="lightning-rod">Lightning Rod</option>
          <option value="well-baked-body">Well-Baked Body</option><option value="wind-rider">Wind Rider</option>
          <option value="purifying-salt">Purifying Salt</option><option value="heatproof">Heatproof</option>
          <option value="thick-fat">Thick Fat</option><option value="wonder-guard">Wonder Guard</option>
        </select>
      </div>
      <div class="adv-row">
        <span class="adv-label" data-i18n="languageLabel">Language</span>
        <select id="lang-select" onchange="setLang(this.value)">
          <option value="en">English</option>
        </select>
      </div>
    </div>
  </div>
  <div id="search-error"></div>
  <div id="feed"></div>
</div>

<p class="footer">made by <a href="https://github.com/Xoudusz" target="_blank" rel="noopener">Xoudusz</a> | powered by <a href="https://pokeapi.co" target="_blank" rel="noopener">PokéAPI</a></p>

<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/render.js"></script>
<script src="js/main.js"></script>
</body>
</html>
